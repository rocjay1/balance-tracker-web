services:
  frontend:
    image: balance-tracker-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: balance-tracker-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
    networks:
      - tunnel-net

  backend:
    image: balance-tracker-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: balance-tracker-backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/finance.db
    volumes:
      - backend-data:/data
    networks:
      - tunnel-net

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: balance-tracker-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - tunnel-net

networks:
  tunnel-net:
    driver: bridge

volumes:
  backend-data:
