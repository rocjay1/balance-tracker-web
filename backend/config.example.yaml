# Global list of email recipients for the daily report
subscribers:
  - "you@example.com"
  - "partner@example.com"

cards:
  - name: "Discover it chrome Card"
    account_number: "LAST_4_DIGITS" # Optional: Use to differentiate cards with same name
    limit: 10000.00
    statement_day: 4        # Day of month the statement closes
    due_day: 3              # Day of month payment is due
    starting_balance: 0.00  # Balance as of the starting_date
    starting_date: "2024-01-01" # Anchor date for calculations (YYYY-MM-DD)

smtp:
  host: "smtp.gmail.com"
  port: 587
  user: "your_email@gmail.com"
  password: "YOUR_APP_PASSWORD" # Generate at https://myaccount.google.com/apppasswords
